name: QuataIos
options:
  bundleIdPrefix: com.quata
targets:
  QuataIos:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quata.ios
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      # QuataFeed re-exports :core for Swift; do not embed a separate Core framework.
      - framework: ../feature/feed/build/bin/iosSimulatorArm64/debugFramework/QuataFeed.framework
        embed: true
schemes:
  QuataIos:
    build:
      targets:
        QuataIos: all
    run:
      config: Debug
