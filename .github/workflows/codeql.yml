name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
            config-file: ./.github/codeql/codeql-config.yml
          - language: javascript-typescript
            build-mode: none
            config-file: ./.github/codeql/javascript-config.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android SDK used by the app
        if: matrix.language == 'java-kotlin'
        shell: bash
        run: |
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          test -x "$sdkmanager"
          yes | "$sdkmanager" --licenses >/dev/null || true
          "$sdkmanager" "platforms;android-36.1" "build-tools;36.1.0"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config-file }}
          queries: security-extended

      - name: Build Android sources for CodeQL
        if: matrix.language == 'java-kotlin'
        shell: bash
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
