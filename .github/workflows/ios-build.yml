name: iOS compile

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-build.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradle.properties"
      - "gradlew"
      - "core/**"
      - "designsystem/**"
      - "feature/**"
      - "web/**"
      - "iosApp/**"
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - ".github/workflows/ios-build.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradle.properties"
      - "gradlew"
      - "core/**"
      - "designsystem/**"
      - "feature/**"
      - "web/**"
      - "iosApp/**"

concurrency:
  group: ios-compile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile-ios:
    name: Kotlin iOS and Swift host
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Select Xcode 16.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Record toolchain
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/reports/ios
          {
            echo "Runner: $RUNNER_OS $RUNNER_ARCH"
            java -version 2>&1
            ./gradlew --version
            xcodebuild -version
            xcodegen --version
            sw_vers
          } | tee build/reports/ios/toolchain.log

      - name: Compile all Kotlin iOS targets
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew \
            :core:compileKotlinIosArm64 \
            :core:compileKotlinIosSimulatorArm64 \
            :designsystem:compileKotlinIosArm64 \
            :designsystem:compileKotlinIosSimulatorArm64 \
            :web:compileKotlinIosArm64 \
            :web:compileKotlinIosSimulatorArm64 \
            :feature:auth:compileKotlinIosArm64 \
            :feature:auth:compileKotlinIosSimulatorArm64 \
            :feature:chat:compileKotlinIosArm64 \
            :feature:chat:compileKotlinIosSimulatorArm64 \
            :feature:externalshare:compileKotlinIosArm64 \
            :feature:externalshare:compileKotlinIosSimulatorArm64 \
            :feature:feed:compileKotlinIosArm64 \
            :feature:feed:compileKotlinIosSimulatorArm64 \
            :feature:neighborhoods:compileKotlinIosArm64 \
            :feature:neighborhoods:compileKotlinIosSimulatorArm64 \
            :feature:notifications:compileKotlinIosArm64 \
            :feature:notifications:compileKotlinIosSimulatorArm64 \
            :feature:official:compileKotlinIosArm64 \
            :feature:official:compileKotlinIosSimulatorArm64 \
            :feature:postcomposer:compileKotlinIosArm64 \
            :feature:postcomposer:compileKotlinIosSimulatorArm64 \
            :feature:profile:compileKotlinIosArm64 \
            :feature:profile:compileKotlinIosSimulatorArm64 \
            :feature:settings:compileKotlinIosArm64 \
            :feature:settings:compileKotlinIosSimulatorArm64 \
            :feature:whatsnew:compileKotlinIosArm64 \
            :feature:whatsnew:compileKotlinIosSimulatorArm64 \
            --stacktrace \
            --warning-mode all \
            --console=plain \
            2>&1 | tee build/reports/ios/kotlin-ios.log

      - name: Link QuataFeed simulator framework
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew \
            :feature:feed:linkDebugFrameworkIosSimulatorArm64 \
            --stacktrace \
            --warning-mode all \
            --console=plain \
            2>&1 | tee build/reports/ios/framework-link.log

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      - name: Build Swift iOS host
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/reports/ios/QuataIos.xcresult build/ios-derived-data
          xcodebuild \
            -project iosApp/QuataIos.xcodeproj \
            -scheme QuataIos \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/ios-derived-data \
            -resultBundlePath build/reports/ios/QuataIos.xcresult \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            2>&1 | tee build/reports/ios/xcodebuild.log

      - name: Write report summary
        if: always()
        shell: bash
        run: |
          {
            echo "## iOS compilation report"
            echo
            echo "- Runner: \`macos-15\` (Apple Silicon)"
            echo "- Xcode: \`16.3\`"
            echo "- Kotlin targets: device ARM64 and simulator ARM64"
            echo "- Swift host: \`QuataIos\` for the iOS Simulator"
            echo "- Result bundle: \`QuataIos.xcresult\`"
            echo
            if [[ -f build/reports/ios/xcodebuild.log ]]; then
              echo "### Last Xcode diagnostics"
              echo '```text'
              grep -E "error:|warning:|BUILD (SUCCEEDED|FAILED)" build/reports/ios/xcodebuild.log | tail -n 80 || true
              echo '```'
            elif [[ -f build/reports/ios/kotlin-ios.log ]]; then
              echo "### Last Kotlin diagnostics"
              echo '```text'
              grep -E "^[ew]: |error:|warning:|FAILURE:" build/reports/ios/kotlin-ios.log | tail -n 80 || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect Gradle reports
        if: always()
        shell: bash
        run: |
          mkdir -p build/reports/ios/gradle
          find . -type f -path "*/build/reports/*" \
            ! -path "./build/reports/ios/*" \
            -exec cp -p {} build/reports/ios/gradle/ \; || true

      - name: Upload iOS diagnostic bundle
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-build-report-${{ github.run_id }}
          path: |
            build/reports/ios/
            iosApp/QuataIos.xcodeproj/
            feature/feed/build/bin/iosSimulatorArm64/debugFramework/QuataFeed.framework/
          if-no-files-found: warn
          retention-days: 30
